    <main>
        <section>
            <h2>Add Course</h2>
            <form method="post">
                <label for="1">Course Name:</label>
                <input id="1" type="text" required placeholder="Course Name" name="Course Name"><br><br>

                <label for="2">Lecturer name:</label>
                <input id="2" type="text" required placeholder="Lecturer name" name="Lecturer name"><br><br>

                <label for="n">Credit hours:</label>
                <input id="n" type="number" required placeholder="Credit hours" name="Credithours" min="0" max="5"><br><br>

                <label for="4">Notes:</label>
                <input id="4" type="text" placeholder="Notes" name="Notes"><br><br>

                
                <input type="submit">

                
            </form>
